audio:
  habilitar_asr: true
  habilitar_tts: true
  modelo_asr: 'tiny'
  dispositivo_asr: 'cpu'
  tipo_calculo_asr: 'int8'
  idioma_asr: 'es'
  ruta_voz_tts: 'models/tts/es_MX-claude-high.onnx'
  ruta_configuracion_voz_tts: 'models/tts/es_MX-claude-high.onnx.json'
  hablante_tts: 0
  escala_longitud_tts: 0.84
  escala_ruido_tts: 0.35
  escala_ruido_w_tts: 0.45

negocio:
  maximo_archivos: 1
  maximo_filas_vista: 12
  umbral_z: 1.5

interfaz:
  estado_inicial: 'Carga un CSV, procésalo y pregúntame por voz.'
