aplicacion:
  titulo: 'Asistente de voz basado en datos'
  host: '127.0.0.1'
  port: 7860
  share: false
  debug: false

rutas:
  directorio_datos: 'data'
  directorio_modelo: 'models/llm'
  directorio_asr: 'models/asr'
  directorio_tts: 'models/tts'
  directorio_temporal: 'temp'
  directorio_logs: 'logs'

modelo:
  modo: 'servidor_local'
  ruta_modelo: 'models/llm/model.gguf'
  contexto: 2048
  hilos: 6
  lote: 256
  temperatura: 0.1
  maximo_tokens: 140
  top_p: 0.9
  penalizacion_repeticion: 1.08
